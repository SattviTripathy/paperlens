<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>PaperLens — Scan anything, keep it crisp</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <!-- App shell -->
  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h2L10 3.5h4L15.5 5h2A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z"/>
        <circle cx="12" cy="12" r="3.4"/>
      </svg>
      <span class="brand-name">PaperLens</span>
    </div>
    <div class="topbar-actions">
      <button id="btnExportText" class="btn ghost" title="Export recognized text">Text</button>
      <button id="btnExportPdf" class="btn primary" title="Export all pages to PDF">Export PDF</button>
    </div>
  </header>

  <main id="app">
    <!-- LIBRARY VIEW -->
    <section id="view-library" class="view active">
      <div id="emptyState" class="empty">
        <div class="empty-illustration">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <rect x="14" y="8" width="30" height="40" rx="3"/>
            <rect x="20" y="16" width="30" height="40" rx="3"/>
          </svg>
        </div>
        <h1>Scan anything, keep it crisp</h1>
        <p>Point your camera at a document, or drop in several photos at once. PaperLens finds the edges, flattens each page, cleans it up, and builds one searchable PDF — all on your device.</p>
        <button id="btnStartEmpty" class="btn primary big">New scan</button>
      </div>

      <div id="library" class="library" hidden>
        <div class="library-head">
          <h2><span id="pageCount">0</span> pages</h2>
          <div class="library-actions">
            <button id="btnOcrAll" class="btn ghost">Extract text</button>
            <button id="btnStart" class="btn primary">New scan</button>
          </div>
        </div>
        <div id="pageGrid" class="page-grid"></div>
      </div>
    </section>

    <!-- CAMERA VIEW -->
    <section id="view-camera" class="view camera-view">
      <video id="cameraStream" playsinline autoplay muted></video>
      <div class="camera-controls">
        <button id="btnCameraCancel" class="round ghost" aria-label="Cancel">✕</button>
        <button id="btnShutter" class="shutter" aria-label="Capture"></button>
        <label class="round ghost" aria-label="Choose from files">
          <input id="filePicker" type="file" accept="image/*" multiple hidden />
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="11" r="2"/><path d="M6 18l4-4 3 3 3-4 2 2v3z"/></svg>
        </label>
      </div>
      <p class="camera-hint">Fill the frame with your document</p>
    </section>

    <!-- EDIT (crop / detect) VIEW -->
    <section id="view-edit" class="view edit-view">
      <div class="stage">
        <canvas id="editCanvas"></canvas>
      </div>
      <div class="toolbar">
        <button id="btnEditCancel" class="btn ghost">Cancel</button>
        <button id="btnAutoDetect" class="btn ghost">Auto-detect</button>
        <button id="btnEditRotate" class="btn ghost">Rotate</button>
        <button id="btnEditApply" class="btn primary">Next</button>
      </div>
    </section>

    <!-- FILTER / REVIEW VIEW -->
    <section id="view-filter" class="view filter-view">
      <div class="stage">
        <canvas id="filterCanvas"></canvas>
      </div>
      <div class="filter-strip" id="filterStrip">
        <button class="chip active" data-filter="enhance">Enhance</button>
        <button class="chip" data-filter="original">Original</button>
        <button class="chip" data-filter="gray">Grayscale</button>
        <button class="chip" data-filter="bw">B&amp;W</button>
      </div>
      <div class="toolbar">
        <button id="btnFilterBack" class="btn ghost">Back</button>
        <button id="btnFilterRotate" class="btn ghost">Rotate</button>
        <button id="btnFilterSave" class="btn primary">Save page</button>
      </div>
    </section>
  </main>

  <!-- PAGE DETAIL MODAL -->
  <div id="pageModal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-image"><img id="modalImg" alt="Scanned page" /></div>
      <div id="ocrPanel" class="ocr-panel" hidden>
        <textarea id="ocrText" placeholder="Recognized text will appear here…" spellcheck="false"></textarea>
      </div>
      <div class="modal-actions">
        <button id="btnModalClose" class="btn ghost">Close</button>
        <button id="btnModalRecrop" class="btn ghost">Re-crop</button>
        <button id="btnModalDelete" class="btn danger">Delete</button>
        <button id="btnModalOcr" class="btn primary">Extract text (OCR)</button>
      </div>
    </div>
  </div>

  <!-- Toast / loader -->
  <div id="loader" class="loader" hidden>
    <div class="spinner"></div>
    <span id="loaderText">Working…</span>
  </div>
  <div id="toast" class="toast" hidden></div>

  <!-- Libraries (loaded from CDN; cached by the service worker after first run) -->
  <script async src="https://docs.opencv.org/4.9.0/opencv.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- App code -->
  <script src="cv-pipeline.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
